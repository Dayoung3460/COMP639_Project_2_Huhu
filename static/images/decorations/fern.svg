<?xml version="1.0" encoding="UTF-8"?>
<!--
  fern.svg — decorative fern fronds overlay for the hero banner.
  Extracted from the 2026-05-12 design integration (was previously
  inlined as a data:URI in custom.css). References:
    - .hero::before in custom.css applies this as background-image
      with opacity 0.7 and mix-blend-mode: screen, so it tints the
      hero gradient/photo without obscuring it.
  Strokes are literally white at 0.08 opacity — calibrated to read
  on dark backgrounds. Don't theme-recolor; the blend mode handles
  per-theme integration.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <g fill="none" stroke="white" stroke-opacity="0.08" stroke-width="1.2"
     stroke-linecap="round">
    <path d="M50 380 Q 80 280 60 180 Q 50 100 120 60"/>
    <path d="M60 180 Q 100 180 130 150"/>
    <path d="M70 230 Q 110 230 145 200"/>
    <path d="M85 290 Q 130 290 170 255"/>
    <path d="M450 400 Q 480 300 460 200 Q 450 120 520 80"/>
    <path d="M460 200 Q 500 200 530 170"/>
    <path d="M470 250 Q 510 250 545 220"/>
    <path d="M250 400 Q 280 320 260 240 Q 250 170 320 130"/>
    <path d="M260 240 Q 300 240 330 210"/>
  </g>
</svg>
