{% extends 'base.html' %}
{% block title %}Edit Trap{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:560px;">
  <h2 class="mb-4">Edit Trap</h2>
  
  <form method="POST" action="{{ url_for('edit_trap', line_id=line_id, trap_id=trap.trap_id) }}">
    <div class="mb-3">
      <label for="trapCode" class="form-label">Trap Code</label>
      <input type="text" class="form-control" id="trapCode" name="trap_code" value="{{ trap.code }}" required>
    </div>

    <div class="mb-3">
      <label for="trapType" class="form-label">Trap Type</label>
      <select class="form-control" id="trapType" name="trap_type" required>
        {% for value in trap_types %}
          <option value="{{ value }}" {% if trap.trap_type == value %}selected{% endif %}>{{ value }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-3">
      <label for="trapLatitude" class="form-label">Trap Latitude</label>
      <input type="number" class="form-control" id="trapLatitude" name="trap_latitude" step="0.000001" min="-999.999999" max="999.999999" value="{{ trap.latitude }}" required>
    </div>

    <div class="mb-3">
      <label for="trapLongitude" class="form-label">Trap Longitude</label>
      <input type="number" class="form-control" id="trapLongitude" name="trap_longitude" step="0.000001" min="-180.0" max="180.0" value="{{ trap.longitude }}" required>
    </div>

    <a href="{{ url_for('line_detail', line_id=line_id) }}" class="btn btn-secondary">Cancel</a>
    <button type="submit" class="btn btn-primary">Save Changes</button>
  </form>
</div>
{% endblock %}
