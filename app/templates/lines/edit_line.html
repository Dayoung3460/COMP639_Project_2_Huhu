{% extends 'base.html' %}
{% block title %}Edit Line{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:560px;">
  <h2 class="mb-4">Edit Line</h2>
  <form method="POST" action="{{ url_for('edit_line', line_id=line_id) }}">
    <div class="mb-3">
      <label for="lineName" class="form-label">Line Name</label>
      <input type="text" class="form-control" id="lineName" name="line_name" value="{{ line.name }}" required>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-pf">Save Changes</button>
      <a href="{{ url_for('lines_index') }}" class="btn btn-pf-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
