{% extends 'base.html' %}
{% block title %}Edit Line{% endblock %}

{% block page_title %}
<div class="d-flex align-items-center gap-3">
  <div class="stat-icon amber" style="width: 36px; height: 36px; font-size: 18px;">
    <i class="bi bi-pencil-square"></i>
  </div>
  Edit Line
</div>
{% endblock %}

{% block header_actions %}
<nav aria-label="breadcrumb">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="{{ nav_dashboard_url }}">Dashboard</a></li>
    <li class="breadcrumb-item"><a href="{{ url_for('lines_index') }}">Lines</a></li>
    <li class="breadcrumb-item active">Edit</li>
  </ol>
</nav>
{% endblock %}

{% block content %}
<div class="container py-2" style="max-width:560px;">
  <form method="POST" action="{{ url_for('edit_line', line_id=line_id) }}">
    <div class="mb-3">
      <label for="lineName" class="form-label">Line Name</label>
      <input type="text" class="form-control" id="lineName" name="line_name" value="{{ line.name }}" required>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-pf">Save Changes</button>
      <a href="{{ url_for('lines_index') }}" class="btn btn-pf-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
