{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:520px;">
  <h2 class="mb-1">Create Account</h2>
  <p class="text-muted small mb-4">
    You will be registered as an Observer. An Admin can upgrade your role.
  </p>
  <form method="POST" action="{{ url_for('register') }}">
    <div class="row g-3">
      <div class="col-12">
        <label class="form-label">Username <span class="text-danger">*</span></label>
        <input type="text" class="form-control" name="username" required>
      </div>
      <div class="col-12">
        <label class="form-label">Email <span class="text-danger">*</span></label>
        <input type="email" class="form-control" name="email" required>
      </div>
      <div class="col-6">
        <label class="form-label">Password <span class="text-danger">*</span></label>
        <input type="password" class="form-control" name="password" required>
        <div class="form-text">Min 8 chars, mixed types</div>
      </div>
      <div class="col-6">
        <label class="form-label">Confirm Password <span class="text-danger">*</span></label>
        <input type="password" class="form-control" name="confirm_password" required>
      </div>
      <div class="col-6">
        <label class="form-label">First Name <span class="text-danger">*</span></label>
        <input type="text" class="form-control" name="first_name" required>
      </div>
      <div class="col-6">
        <label class="form-label">Last Name <span class="text-danger">*</span></label>
        <input type="text" class="form-control" name="last_name" required>
      </div>
      <div class="col-12">
        <label class="form-label">Phone / Contact Info</label>
        <input type="text" class="form-control" name="contact_info">
      </div>
      <div class="col-6">
        <label class="form-label">Emergency Contact Name</label>
        <input type="text" class="form-control" name="emergency_name">
      </div>
      <div class="col-6">
        <label class="form-label">Emergency Contact Phone</label>
        <input type="text" class="form-control" name="emergency_phone">
      </div>
    </div>
    <button type="submit" class="btn btn-pf w-100 mt-4">Create Account</button>
  </form>
  <p class="text-center mt-3 small">
    Already have an account? <a href="{{ url_for('login') }}">Log In</a>
  </p>
</div>
{% endblock %}
