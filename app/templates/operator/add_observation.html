{% extends 'base.html' %}
{% block title %}Add Observation{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:580px;">
  <h2 class="mb-4">Add Incidental Observation</h2>
  <form method="POST" action="{{ url_for('add_observation') }}">
    <div class="mb-3">
      <label class="form-label">Observation Type <span class="text-danger">*</span></label>
      <select name="obs_type" class="form-select" required>
        <option value="">— select —</option>
        <option>Bird sighting</option>
        <option>Predator sighting</option>
        <option>Predator tracks</option>
        <option>Native species tracks</option>
        <option>Native species sign</option>
        <option>Other</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Date &amp; Time <span class="text-danger">*</span></label>
      <input type="datetime-local" class="form-control" name="obs_date" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Location</label>
      <input type="text" class="form-control" name="location"
             placeholder="e.g. North Line near trap NL-03">
    </div>
    <div class="mb-3">
      <label class="form-label">Notes</label>
      <textarea class="form-control" name="notes" rows="3"
                placeholder="Describe what you observed..."></textarea>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-pf">Save Observation</button>
      <a href="{{ url_for('operator_dashboard') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
