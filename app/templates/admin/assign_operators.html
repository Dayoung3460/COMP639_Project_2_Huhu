{% extends 'base.html' %}
{% block title %}Assign Operators{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:560px;">
  <h2 class="mb-1">Assign Operators</h2>
  <p class="text-muted small mb-4">Line: {{ line.name if line else '—' }}</p>

  <form method="POST">
    <label class="form-label">Select Operators to assign to this line:</label>
    <div class="border rounded p-3 mb-3">
      {% for op in all_operators %}
        <div class="form-check">
          <input class="form-check-input" type="checkbox"
                 name="operator_ids" value="{{ op.user_id }}"
                 id="op{{ op.user_id }}"
                 {{ 'checked' if op.user_id in assigned_ids }}>
          <label class="form-check-label" for="op{{ op.user_id }}">
            {{ op.first_name }} {{ op.last_name }} (@{{ op.username }})
          </label>
        </div>
      {% else %}
        <p class="text-muted small">No operators registered yet.</p>
      {% endfor %}
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-pf">Save Assignments</button>
      <a href="{{ url_for('lines_index') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
