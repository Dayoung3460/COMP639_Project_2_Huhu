{% extends 'base.html' %}
{% block title %}Manage Species{% endblock %}
{% block content %}
<div class="container py-4 stick-table-header-container">
  <h2 class="mb-4">Manage Species</h2>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <input type="text" id="search-input" placeholder="Search species..." class="form-control">
    <button
      type="button"
      class="btn btn-primary"
      style="flex: 0 0 auto; margin-left: 1rem;"
      data-bs-toggle="modal"
      data-bs-target="#edit-modal"
      data-bs-add="true"
    >Add a Species</button>
  </div>

  <div class="card mb-4">
    <div class="card-body">
      <section class="table-container">
        <table class="table table-striped align-middle">
          <thead>
            <tr>
              <th>Name</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>

          <tbody>
            {% for species in species_list %}
            <tr>
              <td class="name-column">
                <p class="mb-0">- {{ species.name }}</p>
              </td>

              <td class="text-end">
                <button type="button" 
                  class="btn btn-sm btn-outline-secondary"
                  data-bs-toggle="modal" 
                  data-bs-target="#edit-modal"
                  data-species-name="{{ species.name }}"
                >
                  Edit
                </button>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </section>
    </div>
  </div>

  <div class="modal fade pop-up-modal" id="edit-modal" tabindex="-1">
    <div class="modal-dialog" style="margin-top: 10vh;">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Species</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <form method="POST" action="{{ url_for('manage_species') }}">
          <input type="hidden" name="current-species-name" id="current-species-name" value="" />
          <input type="hidden" name="modal-action" id="modal-action" value="" />

          <div class="modal-body">
            <div class="mb-3">
              <label for="species-name" class="form-label">Enter a new species name</label>
              <input type="text" class="form-control" id="species-name" name="species-name" value="" required>
            </div>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Confirm</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Edit modal
  const editModal = document.getElementById('edit-modal');
  editModal.addEventListener('show.bs.modal', (event) => {
    var button = event.relatedTarget;
    var speciesName = button.getAttribute('data-species-name');

    var modalTitle = editModal.querySelector('.modal-title');
    var speciesNameInput = editModal.querySelector('#species-name');
    var currentSpeciesNameInput = editModal.querySelector('#current-species-name');
    var isAdd = button.getAttribute('data-bs-add') === 'true';
    var modalActionInput = editModal.querySelector('#modal-action');

    modalActionInput.value = isAdd ? 'add' : 'edit';
    modalTitle.textContent = isAdd ? 'Add Species' : 'Edit Species - ' + speciesName;
    speciesNameInput.value = speciesName;
    currentSpeciesNameInput.value = speciesName;
  });

  // Search function
  document.getElementById('search-input').addEventListener('input', (e) => {
    var searchTerm = e.target.value.toLowerCase();
    var tableRows = document.querySelectorAll('.table tbody tr');

    tableRows.forEach((row) => {
      var speciesName = row.querySelector('td.name-column').textContent.toLowerCase();

      if (speciesName.includes(searchTerm)) {
        row.style.display = '';
      } else {
        row.style.display = 'none';
      }
    });
  });
</script>
{% endblock %}
