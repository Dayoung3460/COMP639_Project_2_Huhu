{% extends 'base.html' %}
{% block title %}Edit User Role{% endblock %}
{% block content %}
<div class="container py-4" style="max-width: 500px;">
  <h2 class="mb-4">Edit User Role</h2>
  
  <div class="card mb-4">
    <div class="card-body">
      <h5 class="card-title">{{ user.first_name }} {{ user.last_name }}</h5>
      <p class="card-text text-muted mb-0">
        <strong>Username:</strong> {{ user.username }}<br>
        <strong>Email:</strong> {{ user.email }}<br>
        <strong>Current Role:</strong> <span class="badge bg-info">{{ user.role }}</span>
      </p>
    </div>
  </div>

  <form method="POST" action="{{ url_for('edit_role', user_id=user.user_id) }}" onsubmit="return confirm('Are you sure you want to change this user\'s role?')">
    <div class="mb-3">
      <label class="form-label">New Role <span class="text-danger">*</span></label>
      <select name="role" class="form-select" required>
        <option value="">— select role —</option>
        {% for role in roles %}
          <option value="{{ role }}" {% if user.role == role %}selected{% endif %}>{{ role }}</option>
        {% endfor %}
      </select>
    </div>
    
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-pf">Save Changes</button>
      <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
