{% extends 'base.html' %}
{% block title %}Manage Bait Types{% endblock %}
{% block content %}
<div class="container py-4 bait-types-container">
  <h2 class="mb-4">Manage Bait Types</h2>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <input type="text" id="search-input" placeholder="Search bait types..." class="form-control">
    <button
      type="button"
      class="btn btn-primary"
      style="flex: 0 0 auto; margin-left: 1rem;"
      data-bs-toggle="modal"
      data-bs-target="#edit-modal"
      data-bs-add="true"
    >Add a Bait Type</button>
  </div>

  <div class="card mb-4">  
    <div class="card-body">
      <section class="table-container">
        <table class="table table-striped align-middle">
          <thead>
            <tr>
              <th>Name</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody>
            {% for bait_type in bait_types %}
            <tr>
              <td class="name-column">
                <p class="mb-0">- {{ bait_type.name }}</p>
              </td>

              <td>
                <button type="button" 
                  class="btn btn-sm btn-outline-secondary"
                  data-bs-toggle="modal" 
                  data-bs-target="#edit-modal"
                  data-bait-type-name="{{ bait_type.name }}"
                >
                  Edit
                </button>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </section>
    </div>
  </div>

  <div class="modal fade pop-up-modal" id="edit-modal" tabindex="-1">
    <div class="modal-dialog" style="margin-top: 10vh;">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Bait Type</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <form method="POST" action="{{ url_for('manage_bait_types') }}">
          <div class="modal-body">
            <input type="hidden" name="current-bait-type-name" id="current-bait-type-name" value="" />
            <input type="hidden" name="modal-action" id="modal-action" value="" />

            <div class="mb-3">
              <label for="baitTypeName" class="form-label">Enter a new bait type name</label>
              <input type="text" class="form-control" id="baitTypeName" name="bait-type-name" value="" required>
            </div>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Confirm</button>
          </div>
        </form>        
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Edit modal
  const editModal = document.getElementById('edit-modal');
  editModal.addEventListener('show.bs.modal', (event) => {
    var button = event.relatedTarget;
    var baitTypeName = button.getAttribute('data-bait-type-name');

    var modalTitle = editModal.querySelector('.modal-title');
    var baitTypeNameInput = editModal.querySelector('#baitTypeName');
    var currentBaitTypeNameInput = editModal.querySelector('#current-bait-type-name');
    var isAdd = button.getAttribute('data-bs-add') === 'true';
    var modalActionInput = editModal.querySelector('#modal-action');

    modalActionInput.value = isAdd ? 'add' : 'edit';
    modalTitle.textContent = isAdd ? 'Add Bait Type' : 'Edit Bait Type - ' + baitTypeName;
    baitTypeNameInput.value = baitTypeName;
    currentBaitTypeNameInput.value = baitTypeName;
  });

  // Search function
  document.getElementById('search-input').addEventListener('input', (e) => {
    var searchTerm = e.target.value.toLowerCase();
    var tableRows = document.querySelectorAll('.table tbody tr');

    tableRows.forEach((row) => {
      var baitTypeName = row.querySelector('td.name-column').textContent.toLowerCase();

      if (baitTypeName.includes(searchTerm)) {
        row.style.display = '';
      } else {
        row.style.display = 'none';
      }
    });
  });
</script>
{% endblock %}
