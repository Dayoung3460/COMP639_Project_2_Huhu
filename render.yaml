# Render Blueprint — deploys the Flask app as a free web service.
# DB is external (e.g. Neon free tier); set the DB_* env vars in the
# Render dashboard after the first deploy.
services:
  - type: web
    name: tiaki
    runtime: python
    plan: free
    region: oregon  # keep the DB (Neon us-west-2) in the same region
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn 'app:app' --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: SECRET_KEY
        generateValue: true
      - key: ENABLE_QUICK_LOGIN
        value: "false"
      - key: DB_SSLMODE
        value: require
      - key: DB_PORT
        value: "5432"
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
